# osv-scanner baseline — explicit, time-boxed exceptions for the CI vuln gate.
#
# Read this with .github/workflows/security-scan.yml. osv-scanner has no native
# severity-threshold flag, so the gate is "any known vuln fails". Findings we
# have triaged as not-currently-actionable are accepted HERE, one block each,
# with a reason and an `ignoreUntil` review date — never silently. A *new* vuln,
# or any of these resurfacing under a different id, still fails the build.
#
# All three entries below are build/dev-tooling only: the production site is
# pre-built static assets on S3 + CloudFront, so Vite's and esbuild's dev
# servers never run in prod. The real fix for every one is a deliberate Vite v6
# major upgrade (pulls esbuild >=0.25), which is out of scope for this
# detector-only change and tracked separately.
#
# Review date 2026-09-13 (~quarterly): on/after it, osv-scanner stops honouring
# these and the gate goes red again, forcing a re-triage rather than letting an
# exception rot silently.

[[IgnoredVulns]]
id = "GHSA-67mh-4wv8-2f99"
ignoreUntil = 2026-09-13
reason = "esbuild dev-server only (transitive via vite): lets any site read dev-server responses. Never runs in prod (static S3/CloudFront build). Fix needs esbuild >=0.25 via a Vite v6 bump, tracked separately."

[[IgnoredVulns]]
id = "GHSA-gv7w-rqvm-qjhr"
ignoreUntil = 2026-09-13
reason = "esbuild RCE via the Deno module install path (missing binary integrity check, NPM_CONFIG_REGISTRY). High CVSS but not reachable here: we install via pnpm/Node, not Deno. Fix needs esbuild >=0.28 via a Vite v6 bump, tracked separately."

[[IgnoredVulns]]
id = "GHSA-4w7w-66w2-5vf9"
ignoreUntil = 2026-09-13
reason = "vite (CVE-2026-39365) dev-server path traversal in optimized-deps .map handling. Dev-time only; not in the shipped static bundle. Fix needs vite >=6.4.2 (major bump), tracked separately."
