version: 2
updates:
  - package-ecosystem: npm # picks up the pnpm workspace from the root lockfile
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        update-types: ["minor", "patch"]
