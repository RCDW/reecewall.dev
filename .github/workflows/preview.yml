name: preview

# Deploys a per-PR preview to pr-N.preview.reecewall.dev. Deliberately NOT
# paths-filtered (unlike deploy.yml): a preview's value is "review rendered
# reality", which applies even to PRs that only need a does-it-still-render
# check — and it makes every PR, including this workflow's own, self-testing.
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  id-token: write # OIDC — assume the preview role (no stored keys)
  contents: read
  pull-requests: write # post/update the preview-URL comment

# One deploy per PR; a new push supersedes the in-flight run.
concurrency:
  group: preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    # Fork PRs get no OIDC token, so the deploy can't authenticate. Skip them
    # cleanly rather than failing — own-repo branches only.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile

      # Built with the default Vite base ("/"). The CloudFront function applies
      # the per-PR prefix at the edge, so the build needs no per-PR config.
      - run: pnpm build

      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ vars.PREVIEW_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Same cache strategy as prod: hashed assets immutable, index.html never
      # cached. Scoped to this PR's prefix; --delete only affects pr-N/.
      - name: Sync assets to pr-${{ github.event.number }}/
        run: |
          aws s3 sync apps/web/dist "s3://${{ vars.PREVIEW_BUCKET }}/pr-${{ github.event.number }}" \
            --delete --cache-control "public,max-age=31536000,immutable" \
            --exclude index.html

      - name: Upload index.html (no-cache)
        run: |
          aws s3 cp apps/web/dist/index.html "s3://${{ vars.PREVIEW_BUCKET }}/pr-${{ github.event.number }}/index.html" \
            --cache-control "no-cache"

      # Wait for the invalidation to actually complete, not just submit it, so
      # the smoke-preview job (needs: deploy-preview) hits live content and not
      # a stale edge cache. This is what makes the deployed-URL smoke test
      # deterministic rather than racing propagation.
      - name: Invalidate this PR's path and wait
        run: |
          id=$(aws cloudfront create-invalidation \
            --distribution-id "${{ vars.PREVIEW_DISTRIBUTION_ID }}" \
            --paths "/pr-${{ github.event.number }}/*" \
            --query 'Invalidation.Id' --output text)
          aws cloudfront wait invalidation-completed \
            --distribution-id "${{ vars.PREVIEW_DISTRIBUTION_ID }}" \
            --id "$id"

      # One sticky comment per PR, updated in place (found via the hidden
      # marker) so repeated pushes don't spam the thread. Uses the built-in
      # GITHUB_TOKEN — first-party action, no third-party trust surface.
      - name: Comment preview URL
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const pr = context.issue.number;
            const url = `https://pr-${pr}.preview.reecewall.dev`;
            const marker = '<!-- preview-url -->';
            const body = [
              marker,
              '🚀 **Preview deployed**',
              '',
              `**${url}**`,
              '',
              `Commit \`${context.sha.slice(0, 7)}\` · updated ${new Date().toUTCString()}`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });
            const existing = comments.find((c) => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body,
              });
            }

  # Smoke-test the *deployed* preview — the real CloudFront edge, S3, and
  # per-PR routing — the last gate before prod. `needs: deploy-preview` means
  # this only runs after the deploy and its invalidation-wait succeed, so the
  # content is provably live (no propagation race). Same Playwright spec as the
  # build-job smoke, pointed at the preview URL via SMOKE_BASE_URL. Skipped on
  # fork PRs automatically: deploy-preview is skipped there, so this is too.
  smoke-preview:
    needs: deploy-preview
    runs-on: ubuntu-latest
    # Only needs to load a public URL — no AWS, no PR writes.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile

      # No build/serve here — we test the already-deployed artifact.
      - run: pnpm --filter @reecewall/web exec playwright install --with-deps chromium

      - name: Smoke-test the deployed preview
        env:
          SMOKE_BASE_URL: https://pr-${{ github.event.number }}.preview.reecewall.dev
        run: pnpm --filter @reecewall/web test:e2e

  # Lighthouse against the deployed preview — INFORMATIONAL, not a gate. It runs
  # after the deploy (needs: deploy-preview, so content is live) and posts the
  # four category scores as a sticky PR comment to build a baseline. It has no
  # assertions, so it never fails the PR; once scores are stable, blocking can be
  # added by introducing error-level assertions on the stable categories
  # (accessibility / best-practices / SEO) in lighthouserc.json — perf is the
  # noisy one on shared runners, which is exactly why this starts informational.
  lighthouse-preview:
    needs: deploy-preview
    runs-on: ubuntu-latest
    # Reads a public URL and posts a PR comment — no AWS, no id-token.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: 22 }

      # Median of 3 runs (config in lighthouserc.json). Chrome is preinstalled on
      # the runner; @lhci/cli is fetched on demand (pinned), so no repo dep.
      - name: Run Lighthouse (median of 3, informational)
        env:
          PREVIEW_URL: https://pr-${{ github.event.number }}.preview.reecewall.dev
        run: npx -y @lhci/cli@0.15.1 autorun --collect.url="$PREVIEW_URL"

      - name: Comment Lighthouse scores
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const fs = require('fs');
            const manifest = JSON.parse(
              fs.readFileSync('.lighthouseci/manifest.json', 'utf8'),
            );
            const run = manifest.find((m) => m.isRepresentativeRun) || manifest[0];
            const s = run.summary;
            const pct = (n) => Math.round(n * 100);
            const dot = (n) => (n >= 0.9 ? '🟢' : n >= 0.5 ? '🟠' : '🔴');
            const row = (label, n) => `| ${label} | ${dot(n)} ${pct(n)} |`;

            const marker = '<!-- lighthouse -->';
            const body = [
              marker,
              '📊 **Lighthouse** — median of 3, mobile · _informational, not a gate_',
              '',
              '| Category | Score |',
              '| --- | --- |',
              row('Performance', s.performance),
              row('Accessibility', s.accessibility),
              row('Best Practices', s['best-practices']),
              row('SEO', s.seo),
              '',
              `Against ${run.url} · commit \`${context.sha.slice(0, 7)}\``,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
