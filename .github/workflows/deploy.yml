name: deploy

on:
  push:
    branches: [main]
    paths: ["apps/**", "packages/**", "package.json", "pnpm-lock.yaml"]
  workflow_dispatch: {} # manual "deploy current main" — ignores the paths filter

permissions:
  id-token: write # OIDC — assume the AWS role, no stored keys
  contents: read

# Serialise deploys and never cancel one mid-flight. A deploy is not atomic
# (sync assets with --delete → upload index.html → invalidate), so cancelling it
# can leave prod in a broken half-state, or cancel a good run in favour of a
# newer one that then fails — both leave prod behind main, which has happened.
# With cancel-in-progress false a running deploy always finishes; GitHub keeps
# only the newest queued run, so prod converges on the latest main. To force a
# redeploy (e.g. a build-affecting change the paths filter missed), use the
# workflow_dispatch above.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # CV PDF + ATS .docx are generated from apps/web/src/data/cv.ts (the single
      # source) and written into apps/web/dist so they ship with the site — never
      # committed. The phone number lives only in this secret, injected at render.
      - run: pnpm --filter @reecewall/web exec playwright install --with-deps chromium
      - name: Generate CV documents
        run: pnpm cv:generate
        env:
          CV_PHONE: ${{ secrets.CV_PHONE }}

      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Hashed assets cached hard; index.html never cached (instant deploys).
      - name: Sync assets
        run: |
          aws s3 sync apps/web/dist "s3://${{ vars.SITE_BUCKET }}" \
            --delete --cache-control "public,max-age=31536000,immutable" \
            --exclude index.html
      - name: Upload index.html
        run: |
          aws s3 cp apps/web/dist/index.html "s3://${{ vars.SITE_BUCKET }}/index.html" \
            --cache-control "no-cache"
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CF_DISTRIBUTION_ID }}" --paths "/*"
