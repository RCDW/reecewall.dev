name: deploy

on:
  push:
    branches: [main]
    paths: ["apps/**", "packages/**", "package.json", "pnpm-lock.yaml"]
  workflow_dispatch: {}

permissions:
  id-token: write # OIDC — assume the AWS role, no stored keys
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Hashed assets cached hard; index.html never cached (instant deploys).
      - name: Sync assets
        run: |
          aws s3 sync apps/web/dist "s3://${{ vars.SITE_BUCKET }}" \
            --delete --cache-control "public,max-age=31536000,immutable" \
            --exclude index.html
      - name: Upload index.html
        run: |
          aws s3 cp apps/web/dist/index.html "s3://${{ vars.SITE_BUCKET }}/index.html" \
            --cache-control "no-cache"
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CF_DISTRIBUTION_ID }}" --paths "/*"
