name: ci

# Runs on every PR into main. No deploy, no AWS — just proves the monorepo
# typechecks and builds. This is the check you mark "required" on the main
# ruleset once it has run at least once.
on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Read-only: this workflow never needs to assume the AWS role or write anything.
permissions:
  contents: read

# One run per PR; new pushes to the branch cancel the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6 # version comes from packageManager in package.json

      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm format:check
      # turbo build runs `tsc -b && vite build` across the workspace,
      # so this exercises both typechecking and the production build.
      - run: pnpm build
  peer-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      # Non-frozen, lockfile-only: re-resolves the graph and applies strict
      # peer rules WITHOUT the frozen replay that hides the mismatch. Errors
      # on unmet peers (react 18 + react-dom 19); writes nothing we keep.
      - run: pnpm install --lockfile-only --strict-peer-dependencies --no-frozen-lockfile
