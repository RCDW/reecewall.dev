name: ci

# Runs on every PR into main. No deploy, no AWS — just proves the monorepo
# typechecks and builds. This is the check you mark "required" on the main
# ruleset once it has run at least once.
on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Read-only: this workflow never needs to assume the AWS role or write anything.
permissions:
  contents: read

# One run per PR; new pushes to the branch cancel the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6 # version comes from packageManager in package.json

      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile

      # Re-evaluate the dependency graph against strict peer rules. --frozen-lockfile
      # replays Dependabot's lockfile and skips peer re-resolution, so the install
      # above won't catch an unmet peer (react 18 with react-dom 19). This step
      # forces the check that actually gates that class.
      - run: pnpm install --resolution-only --strict-peer-dependencies

      - run: pnpm lint
      - run: pnpm format:check
      # turbo build runs `tsc -b && vite build` across the workspace,
      # so this exercises both typechecking and the production build.
      - run: pnpm build
