name: ci

# Runs on every PR into main. No deploy, no AWS — just proves the monorepo
# typechecks and builds. This is the check you mark "required" on the main
# ruleset once it has run at least once.
on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Read-only: this workflow never needs to assume the AWS role or write anything.
permissions:
  contents: read

# One run per PR; new pushes to the branch cancel the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6 (pnpm version from packageManager in package.json)

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile

      # react and react-dom must share a major. An 18 + 19 split builds and
      # serves 200s but never mounts (blank page) — it reached prod once via a
      # Dependabot bump. strict-peer-dependencies can't catch it (autoInstallPeers
      # bakes the split into the lockfile as "satisfied"; --frozen-lockfile never
      # evaluates peers), so we assert the installed majors directly.
      - run: node scripts/check-react-pairing.mjs

      - run: pnpm lint
      - run: pnpm format:check
      # turbo build runs `tsc -b && vite build` across the workspace,
      # so this exercises both typechecking and the production build.
      - run: pnpm build

  # Catches the failure class build can't: a bundle that compiles and serves
  # 200s but never mounts (blank #root, no console error) — it has reached prod
  # twice. Builds, serves the production build with `vite preview`, then loads
  # it in headless Chromium and asserts React actually mounted. Separate job so
  # it's independently meaningful and runs in parallel with build.
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile

      # The smoke test serves the production build, so it must exist first.
      - run: pnpm build

      # Only the one browser the test uses; --with-deps adds the system libs
      # Chromium needs on the runner.
      - run: pnpm --filter @reecewall/web exec playwright install --with-deps chromium

      - run: pnpm --filter @reecewall/web test:e2e
